<!DOCTYPE html>
<html lang="en">
<head>
    <title>Select Career - JuzSTILS</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

<div class="container">

    <h1>Select Your Career</h1>

    <!-- GRADE SELECTION -->
    <h3>Select Your Grade</h3>
    <select id="gradeSelect">
        <option value="">-- Choose Grade --</option>
        <option value="8">8th</option>
        <option value="9">9th</option>
        <option value="10">10th</option>
        <option value="11">11th</option>
        <option value="12">12th</option>
    </select>

    <!-- CAREER SELECTION -->
    <h3>Select Career</h3>
    <select id="careerSelect">
        <option value="">-- Choose Career --</option>
        <option value="Software Developer">Software Developer</option>
        <option value="Doctor">Doctor</option>
        <option value="Business">Business / Entrepreneur</option>
        <option value="Designer">Designer</option>
        <option value="Lawyer">Lawyer</option>
        <option value="Teacher">Teacher</option>
    </select>

    <!-- BUTTON -->
    <button onclick="showCareer()">Continue</button>

</div>

<!-- VERY IMPORTANT: JS FILE LINK -->
<script src="career.js"></script>

</body>
</html>
