<!DOCTYPE html>
<html lang="en">
<head>
    <title>JuzSTILS</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

<div class="container">

    <h1 class="app-name">JuzSTILS</h1>

    <!-- LOGIN -->
    <div id="login-box">
        <input type="text" id="login-user" placeholder="Email / Phone / Username">
        <input type="password" id="login-pass" placeholder="Password">

        <label style="font-size:12px;">
            <input type="checkbox" id="rememberMe"> Remember Me
        </label>

        <button onclick="login()">Login</button>

        <p class="forgot" onclick="forgotPassword()">Forgot Password?</p>

        <p>New user? <span onclick="showSignup()">Create Account</span></p>

        <p id="login-error"></p>
    </div>

    <!-- SIGNUP -->
    <div id="signup-box" style="display:none;">
        <h2>Create Account</h2>

        <input type="text" id="signup-username" placeholder="Username" oninput="checkUsername()">
        <p id="username-error" style="font-size:12px;"></p>

        <input type="email" id="signup-email" placeholder="Email">
        <input type="text" id="signup-phone" placeholder="Phone (optional)">

        <input type="password" id="signup-pass" placeholder="Password">
        <input type="password" id="signup-confirm" placeholder="Confirm Password">

        <button onclick="signup()">Create Account</button>

        <p>Already have account? <span onclick="showLogin()">Login</span></p>

        <p id="signup-error"></p>
    </div>

    <!-- FORGOT PASSWORD -->
    <div id="forgot-box" style="display:none;">
        <h2>Reset Password</h2>

        <input type="text" id="forgot-input" placeholder="Enter Email or Phone">

        <button onclick="sendOTP()">Send OTP</button>

        <p>Back to <span onclick="showLogin()">Login</span></p>

        <p id="forgot-error"></p>
    </div>

    <!-- OTP -->
    <div id="otp-box" style="display:none;">
        <h2>Enter OTP</h2>

        <input type="text" id="otp-input" placeholder="Enter OTP">

        <button onclick="verifyOTP()">Verify</button>

        <p id="otp-error"></p>
    </div>

    <!-- RESET PASSWORD -->
    <div id="reset-box" style="display:none;">
        <h2>Set New Password</h2>

        <input type="password" id="new-pass" placeholder="New Password">
        <input type="password" id="confirm-new-pass" placeholder="Confirm Password">

        <button onclick="updatePassword()">Update Password</button>

        <p id="reset-error"></p>
    </div>

</div>

<script type="module">
  import { initializeApp } from "https://www.gstatic.com/firebasejs/12.12.0/firebase-app.js";
  import { getAuth, createUserWithEmailAndPassword, signInWithEmailAndPassword } 
  from "https://www.gstatic.com/firebasejs/12.12.0/firebase-auth.js";

  const firebaseConfig = {
    apiKey: "AIzaSyAaTJenVkqLGmnCDKJp_2YJf2Qm5vRRVk4",
    authDomain: "career-app-5377c.firebaseapp.com",
    projectId: "career-app-5377c",
    storageBucket: "career-app-5377c.firebasestorage.app",
    messagingSenderId: "821974930454",
    appId: "1:821974930454:web:fdcde74e5e59fe2f49d137",
    measurementId: "G-K76E93W81M"
  };

  const app = initializeApp(firebaseConfig);
  const auth = getAuth(app);

  // 🔹 SIGNUP
  window.signup = function() {
    let email = document.getElementById("signup-email").value;
    let password = document.getElementById("signup-pass").value;

    createUserWithEmailAndPassword(auth, email, password)
      .then(() => {
        alert("Account created successfully!");
        showLogin();
      })
      .catch(err => {
        document.getElementById("signup-error").innerText = err.message;
      });
  }

  // 🔹 LOGIN
  window.login = function() {
    let email = document.getElementById("login-user").value;
    let password = document.getElementById("login-pass").value;

    signInWithEmailAndPassword(auth, email, password)
      .then(() => {
        window.location.href = "dashboard.html";
      })
      .catch(err => {
        document.getElementById("login-error").innerText = err.message;
      });
  }
</script>

<script src="script.js"></script>
</body>
</html>
